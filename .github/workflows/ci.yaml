name: Run Unit Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Show project structure
        run: |
          pwd
          ls -R  

      - name: Check Python import
        run: |
          uv run python -c "import os; print(os.getcwd())"
          uv run python -c "import api.main"

      - name: Debug imports
        run: |
          uv run python -c "import sys; print(sys.path)"
          uv run python -c "import api"
          uv run python -c "import api.main"  
      - name: Debug imports
        run: |
          uv run python -c "import api; print(api)"
          uv run python -c "import api.main; print('SUCCESS')"          

      - name: Run unit tests
        run: uv run pytest tests/